name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag for release (e.g., v1.0.0). Оставьте пустым — будет взят из последнего коммита по версии файла или автоинкремент.'
        required: false
        default: ''

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        shell: pwsh
        run: |
          $inputTag = "${{ github.event.inputs.tag }}"
          if ($inputTag -ne "") {
            $tag = $inputTag
          } else {
            # Найти последний тег, иначе начать с v1.0.0
            # Используем try/catch, чтобы LASTEXITCODE не сломал шаг
            $lastTag = $null
            try {
              $lastTag = git describe --tags --abbrev=0 2>$null
            } catch {
              # нет тегов — игнорируем
            }
            if (-not $lastTag) {
              $tag = "v1.0.0"
            } else {
              # Автоинкремент patch-версии
              $parts = $lastTag -replace '^v','' -split '\.'
              $patch = [int]$parts[2] + 1
              $tag = "v$($parts[0]).$($parts[1]).$patch"
            }
          }
          Write-Host "tag=$tag"
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          $LASTEXITCODE = 0

      - name: Generate changelog
        id: changelog
        shell: pwsh
        run: |
          $lastTag = git describe --tags --abbrev=0 2>$null
          if ($LASTEXITCODE -ne 0) { $lastTag = $null }

          # Последние 10 коммитов
          if ($lastTag) {
            $log = git log "$lastTag..HEAD" --pretty=format:"- %s (%h)" --no-merges --max-count=10
            $compareUrl = "https://github.com/${{ github.repository }}/compare/${lastTag}...${{ steps.tag.outputs.tag }}"
          } else {
            $log = git log --pretty=format:"- %s (%h)" --no-merges --max-count=10
            $compareUrl = "https://github.com/${{ github.repository }}/commits/${{ steps.tag.outputs.tag }}"
          }

          if (-not $log) {
            $log = "- Initial release"
          }

          echo "lastTag=$lastTag" >> $env:GITHUB_OUTPUT
          echo "compareUrl=$compareUrl" >> $env:GITHUB_OUTPUT

          # Multiline output через heredoc (EOF) — сохраняет реальные переносы строк
          echo "log<<EOF" >> $env:GITHUB_OUTPUT
          $log
          echo "EOF" >> $env:GITHUB_OUTPUT

          $LASTEXITCODE = 0

      - name: Add MSVC to PATH
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build HolyCheck.exe
        run: |
          cl /std:c++17 /EHsc /O2 /MT /utf-8 /DUNICODE /D_UNICODE main.cpp /Fe:HolyCheck.exe /link /SUBSYSTEM:WINDOWS user32.lib gdi32.lib comctl32.lib shell32.lib shlwapi.lib winhttp.lib wininet.lib ole32.lib oleaut32.lib uuid.lib dwmapi.lib gdiplus.lib advapi32.lib

      - name: Create README.txt
        shell: pwsh
        run: |
          $archiveName = "HolyCheck-${{ steps.tag.outputs.tag }}"
          @"
          HolyCheck — утилита для проверки и загрузки программ

          == Запуск ==
          1. Распакуйте архив $archiveName.zip
          2. Запустите HolyCheck.exe — установка не требуется
          3. Выберите нужную вкладку (Мл.сотрудник, Сотрудник, Вед.сотрудник, Доп.программы)
          4. Нажмите на отдельную программу или кнопку «Скачать все»
          5. Дождитесь окончания загрузки

          Скачанные файлы сохраняются в папки, которые создаёт программа.

          == Требования ==
          - OS: Windows 10 или Windows 11
          - Интернет: подключение к сети

          Для самой программы не требуется установка Visual Studio или дополнительных библиотек.

          == Сборка из исходников ==
          Требуется Visual Studio с компонентом «Разработка классических приложений на C++».
          Запустите «Developer Command Prompt» и выполните в корне проекта:
            cl /std:c++17 /EHsc /O2 /MT /utf-8 /DUNICODE /D_UNICODE main.cpp /Fe:HolyCheck.exe /link /SUBSYSTEM:WINDOWS user32.lib gdi32.lib comctl32.lib shell32.lib shlwapi.lib winhttp.lib wininet.lib ole32.lib oleaut32.lib uuid.lib dwmapi.lib gdiplus.lib advapi32.lib
          "@ | Out-File -FilePath README.txt -Encoding utf8

      - name: Create ZIP archive
        shell: pwsh
        run: |
          $archiveName = "HolyCheck-${{ steps.tag.outputs.tag }}"
          Compress-Archive -Path HolyCheck.exe, README.txt -DestinationPath "$archiveName.zip" -Force
          echo "archiveName=$archiveName" >> $env:GITHUB_OUTPUT
          $LASTEXITCODE = 0

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: |
            ${{ steps.changelog.outputs.log }}

            ---
            **[Полный список изменений](${{ steps.changelog.outputs.compareUrl }})**

            ### Инструкция по запуску

            1. Скачайте архив `HolyCheck-${{ steps.tag.outputs.tag }}.zip` из этого релиза (секция **Assets** ниже).
            2. Распакуйте архив.
            3. Запустите `HolyCheck.exe` — установка не требуется.
            4. Выберите нужную вкладку (Мл.сотрудник, Сотрудник, Вед.сотрудник, Доп.программы).
            5. Нажмите на отдельную программу или кнопку **Скачать все**.
            6. Дождитесь окончания загрузки.

            Скачанные файлы сохраняются в папки, которые создаёт программа.

            ### Требования для запуска

            - **OS**: Windows 10 или Windows 11
            - **Интернет**: подключение к сети

            Для самой программы не требуется установка Visual Studio или дополнительных библиотек.
          draft: false
          prerelease: false
          files: HolyCheck-${{ steps.tag.outputs.tag }}.zip
